<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Blueprint Report</title>

    <script async src="https://www.googletagmanager.com/gtag/js?id=G-S5PQGM126Y"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-S5PQGM126Y');
    </script>

    <style>
        * { box-sizing: border-box; }
        body {
            background-color: #0d0b18;
            background-image:
                radial-gradient(1px 1px at 20% 15%, rgba(255,255,255,0.5) 0, transparent 50%),
                radial-gradient(1px 1px at 75% 8%, rgba(255,255,255,0.4) 0, transparent 50%),
                radial-gradient(1px 1px at 40% 35%, rgba(255,255,255,0.3) 0, transparent 50%),
                radial-gradient(1px 1px at 85% 45%, rgba(255,255,255,0.4) 0, transparent 50%),
                radial-gradient(1px 1px at 10% 60%, rgba(255,255,255,0.3) 0, transparent 50%),
                radial-gradient(1px 1px at 60% 75%, rgba(255,255,255,0.4) 0, transparent 50%),
                radial-gradient(1px 1px at 90% 85%, rgba(255,255,255,0.3) 0, transparent 50%);
            background-attachment: fixed;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden;
        }
        .container {
            width: 100%;
            max-width: 480px;
            padding: 24px 20px;
        }

        /* ---------- 공통 카드 ---------- */
        .card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 18px;
            padding: 22px 22px;
            margin-bottom: 14px;
        }
        .card-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 2px;
            color: #00f0ff;
            text-transform: uppercase;
            margin: 0 0 14px 0;
            text-align: center;
        }

        /* ---------- 헤더카드 ---------- */
        .header-card { text-align: center; padding: 20px 22px 22px; }
        .archetype-name {
            font-size: 1.6rem;
            font-weight: 800;
            line-height: 1.2;
            background: linear-gradient(45deg, #00f0ff, #b600ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0 0 14px 0;
        }
        .hook-quote {
            font-size: 1rem;
            line-height: 1.5;
            font-weight: 600;
            color: #f1eef7;
            position: relative;
            padding: 0 6px;
        }
        .hook-quote::before {
            content: "\201C";
            color: #b600ff;
            font-size: 1.6rem;
            display: block;
            line-height: 0.4;
            margin-bottom: 4px;
        }

        /* ---------- YOUR READING ---------- */
        .reading-body p {
            font-size: 1.05rem;
            line-height: 1.85;
            color: #d1ceda;
            margin: 0 0 16px 0;
        }
        .reading-body p:last-child { margin-bottom: 0; }
        .reading-body.fade-in {
            opacity: 0;
            transform: translateY(16px);
            transition: all 0.7s ease-out;
        }
        .reading-body.fade-in.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* ---------- THREE QUESTIONS ---------- */
        .question-item {
            display: flex;
            gap: 14px;
            align-items: flex-start;
            margin-bottom: 18px;
        }
        .question-item:last-child { margin-bottom: 0; }
        .question-num {
            flex: 0 0 auto;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff3b5c, #b600ff);
            color: #fff;
            font-weight: 800;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .question-text {
            font-size: 1rem;
            line-height: 1.6;
            color: #f1eef7;
            font-weight: 600;
            padding-top: 3px;
        }

        /* ---------- CTA 라인 ---------- */
        .cta-line {
            font-size: 0.98rem;
            line-height: 1.7;
            color: #a29eb3;
            text-align: center;
            margin: 4px 0 26px 0;
            padding: 0 6px;
        }

        /* ---------- 감정 버튼 (구매 무관) ---------- */
        .emotion-btn {
            width: 100%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.18);
            color: #f1eef7;
            padding: 14px;
            border-radius: 14px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            margin-bottom: 14px;
            transition: background 0.2s, border-color 0.2s;
        }
        .emotion-btn.saved {
            background: rgba(255, 59, 92, 0.12);
            border-color: rgba(255, 59, 92, 0.4);
            color: #ff8fa3;
        }

        /* ---------- 구매 버튼(골드 강조) ---------- */
        .buy-btn {
            width: 100%;
            background: linear-gradient(90deg, #ffd700, #ff9d00);
            color: #1a1306;
            border: none;
            padding: 18px;
            font-size: 1.15rem;
            font-weight: 800;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 6px 24px rgba(255, 180, 0, 0.25);
            margin-bottom: 22px;
        }
        .buy-btn:active { transform: scale(0.99); }

        /* ---------- waitlist 이메일 수집 폼 ---------- */
        .waitlist-box {
            background: rgba(255, 215, 0, 0.06);
            border: 1px solid rgba(255, 215, 0, 0.25);
            border-radius: 14px;
            padding: 20px;
            margin-bottom: 22px;
            text-align: center;
        }
        .waitlist-msg {
            color: #e8e3f5;
            font-size: 0.95rem;
            line-height: 1.5;
            margin: 0 0 14px;
        }
        .waitlist-form {
            display: flex;
            gap: 8px;
        }
        .waitlist-form input[type="email"] {
            flex: 1;
            padding: 12px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.05);
            color: #fff;
            font-size: 0.95rem;
        }
        .waitlist-form button {
            background: linear-gradient(90deg, #ffd700, #ff9d00);
            color: #1a1306;
            border: none;
            padding: 0 18px;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
        }
        .waitlist-status {
            color: #ff8fa3;
            font-size: 0.85rem;
            margin-top: 8px;
        }
        .waitlist-success {
            text-align: center;
            color: #ffd700;
            font-weight: 700;
            padding: 18px;
            margin-bottom: 22px;
            background: rgba(255, 215, 0, 0.08);
            border-radius: 14px;
        }

        /* ---------- 하단 3버튼줄 ---------- */
        .bottom-actions {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-bottom: 8px;
        }
        .bottom-actions button,
        .bottom-actions a {
            flex: 1;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.12);
            color: #d1ceda;
            padding: 12px 6px;
            border-radius: 12px;
            font-size: 0.82rem;
            font-weight: 600;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
        .bottom-actions .save-action { text-align: left; padding-left: 14px; }

        .legal-footer {
            width: 100%;
            max-width: 480px;
            text-align: center;
            color: #7a82a6;
            font-size: 9pt;
            line-height: 1.8;
            padding: 28px 20px 60px 20px;
        }
        .legal-footer a {
            color: #7a82a6;
            text-decoration: none;
            margin: 0 5px;
        }
        .legal-footer a:hover { color: #00f0ff; }
    </style>
</head>
<body>

    <!-- Netlify Forms 빌드 감지용 (실제 제출은 JS fetch로 처리) -->
    <form name="waitlist" data-netlify="true" netlify-honeypot="bot-field" hidden>
        <input type="email" name="email" />
        <input type="text" name="archetype" />
        <input type="hidden" name="bot-field" />
    </form>

    <div class="container">

        <!-- 헤더카드 -->
        <section class="card header-card">
                        <h1 class="archetype-name" id="archetype-name">Loading...</h1>
            <p class="hook-quote" id="hook-text"></p>
        </section>

        <!-- YOUR READING -->
        <section class="card">
            <p class="card-label">Your Reading</p>
            <div class="reading-body fade-in" id="report-body"></div>
        </section>

        <!-- THREE QUESTIONS -->
        <section class="card">
            <p class="card-label">Three Questions</p>
            <div id="questions-list"></div>
        </section>

        <!-- CTA 한 줄 -->
        <p class="cta-line" id="cta-text"></p>

        <!-- 감정 버튼 -->
        <button class="emotion-btn" id="emotion-save-btn">&#10084; This Felt Like Me</button>

        <!-- 미리보기 (2026.07.03, 인계노트 v48 확정 구조 — /preview.js가 렌더링) -->
        <div id="preview-root"></div>

        <!-- 구매 버튼 / waitlist 폼 영역 -->
        <div id="paywall-area">
            <button class="buy-btn" id="paywall-secure-button">&#128274; Unlock Your Full Blueprint — $4.99</button>
        </div>

        <!-- 하단 3버튼줄 -->
        <div class="bottom-actions">
            <button class="save-action" id="bottom-save-btn">&#128190; Save</button>
            <button id="bottom-share-btn">&#128279; Share</button>
            <a id="bottom-survey-btn" href="https://docs.google.com/forms/d/e/1FAIpQLSdFkagn2LIlcYSsjUEnHys75ilIV4l3fsvYYObfDvA0YoMhSA/viewform" target="_blank" rel="noopener">&#128203; Survey</a>
        </div>
    </div>

    <footer class="legal-footer">
        <a href="/terms.html">Terms of Service</a> ·
        <a href="/privacy.html">Privacy Policy</a> ·
        <a href="/refund.html">Refund Policy</a> ·
        <a href="/contact.html">Contact Us</a>
    </footer>

    <script>
        // 2026.06.30 추가: report.html에 직접 진입(공유 링크, 인앱 브라우저의
        // sessionStorage 유실 등)해 cosmic_name이 없는 경우, 깨진 "UNKNOWN
        // ARCHETYPE" 화면을 보여주는 대신 즉시 index.html로 돌려보냄.
        // 트래픽 실험 중 신규 방문자가 깨진 페이지를 보는 최악의 시나리오 방지.
        if (!sessionStorage.getItem('cosmic_name')) {
            const currentUrlParams = new URLSearchParams(window.location.search);
            window.location.replace(`/index.html?${currentUrlParams.toString()}`);
            throw new Error('Redirecting: no report data in sessionStorage');
        }

        const currentElement = sessionStorage.getItem('cosmic_element_key') || 'unknown';
        const orientation = sessionStorage.getItem('cosmic_orientation') || 'unknown';

        // 2026.06.28 재수정: "Yang Wood" 같은 오행 영문 표기도 사주 용어 노출에
        // 해당한다는 또치님 지적으로, elementName 자체를 오행 표기 없는 순수
        // 아키타입명("THE PIONEER")만 반환하도록 변경. 더 이상 "·" 분리 불필요 —
        // archetype-element 줄도 표시할 내용이 없어져 제거함.
        const archetypePart = sessionStorage.getItem('cosmic_name') || 'UNKNOWN ARCHETYPE';

        document.getElementById('archetype-name').innerText = archetypePart;
        document.getElementById('hook-text').innerText = sessionStorage.getItem('cosmic_hook') || '';

        // 본문 — \n\n 기준 단락 분리
        const bodyRaw = sessionStorage.getItem('cosmic_body') || '';
        const bodyContainer = document.getElementById('report-body');
        bodyRaw.split(/\n\n+/).filter(Boolean).forEach(paragraph => {
            const p = document.createElement('p');
            p.innerText = paragraph;
            bodyContainer.appendChild(p);
        });

        // 질문 3개 — JSON 배열 파싱
        let questions = [];
        try {
            questions = JSON.parse(sessionStorage.getItem('cosmic_questions') || '[]');
        } catch (e) {
            questions = [];
        }
        const questionsList = document.getElementById('questions-list');
        questions.forEach((q, idx) => {
            const item = document.createElement('div');
            item.className = 'question-item';
            item.innerHTML = `<div class="question-num">${idx + 1}</div><div class="question-text"></div>`;
            item.querySelector('.question-text').innerText = q;
            questionsList.appendChild(item);
        });

        document.getElementById('cta-text').innerText = sessionStorage.getItem('cosmic_cta') || '';

        gtag('event', 'view_free_report', {
            'element_type': currentElement,
            'orientation': orientation
        });

        // 본문 스크롤 페이드인 — 로드 즉시 1회 체크 + 스크롤마다 체크
        const reportBody = document.getElementById('report-body');
        function checkReportBodyVisible() {
            if (reportBody.getBoundingClientRect().top < window.innerHeight * 0.8) {
                reportBody.classList.add('visible');
            }
        }
        checkReportBodyVisible();
        window.addEventListener('scroll', checkReportBodyVisible);

        // 감정 버튼 (구매와 무관, 토글)
        const emotionBtn = document.getElementById('emotion-save-btn');
        let emotionSaved = false;
        emotionBtn.addEventListener('click', () => {
            emotionSaved = !emotionSaved;
            emotionBtn.classList.toggle('saved', emotionSaved);
            emotionBtn.innerHTML = emotionSaved ? '&#10084; Glad This Resonated' : '&#10084; This Felt Like Me';
            gtag('event', 'click_save_emotional', {
                'element_type': currentElement,
                'orientation': orientation,
                'saved_state': emotionSaved
            });
        });

        // 하단 저장
        document.getElementById('bottom-save-btn').addEventListener('click', () => {
            gtag('event', 'click_save_button', { 'element_type': currentElement, 'orientation': orientation });
            alert('Save your result by taking a screenshot.');
        });

        // 하단 공유 (2026.07.03 수정: alert 더미 → 실제 공유 기능.
        // 모바일은 네이티브 공유 시트(navigator.share), 데스크톱은 링크 복사 폴백)
        document.getElementById('bottom-share-btn').addEventListener('click', async () => {
            gtag('event', 'click_share_button', { 'element_type': currentElement, 'orientation': orientation });
            const shareData = {
                title: 'Cosmic Blueprint',
                text: 'I just found my relationship archetype. Find yours:',
                url: 'https://getcosmicblueprint.com'
            };
            try {
                if (navigator.share) {
                    await navigator.share(shareData);
                } else {
                    await navigator.clipboard.writeText(shareData.url);
                    alert('Link copied to clipboard!');
                }
            } catch (e) {
                // 사용자가 공유 시트를 닫은 경우 — 아무것도 하지 않음 (정상 동작)
            }
        });

        // 하단 설문
        document.getElementById('bottom-survey-btn').addEventListener('click', () => {
            gtag('event', 'click_feedback_survey', { 'element_type': currentElement, 'orientation': orientation });
        });

        // 구매 버튼 → waitlist 이메일 수집 폼으로 전환
        const paywallArea = document.getElementById('paywall-area');

        function showWaitlistForm() {
            paywallArea.innerHTML = `
                <div class="waitlist-box">
                    <p class="waitlist-msg">The Full Blueprint isn't open for purchase just yet.<br>Leave your email and we'll notify you the moment it launches.</p>
                    <form id="waitlist-form" class="waitlist-form">
                        <input type="email" id="waitlist-email" placeholder="you@example.com" required />
                        <button type="submit">Notify Me</button>
                    </form>
                    <p id="waitlist-status" class="waitlist-status"></p>
                </div>
            `;

            document.getElementById('waitlist-form').addEventListener('submit', async (e) => {
                e.preventDefault();
                const email = document.getElementById('waitlist-email').value.trim();
                const statusEl = document.getElementById('waitlist-status');
                if (!email) return;

                const formData = new URLSearchParams();
                formData.append('form-name', 'waitlist');
                formData.append('email', email);
                formData.append('archetype', currentElement);

                try {
                    await fetch('/', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                        body: formData.toString()
                    });
                    gtag('event', 'waitlist_signup', {
                        'element_type': currentElement,
                        'orientation': orientation
                    });
                    paywallArea.innerHTML = '<p class="waitlist-success">&#10003; You\'re on the list! We\'ll email you at launch.</p>';
                } catch (err) {
                    statusEl.innerText = 'Something went wrong. Please try again.';
                }
            });
        }

        // 2026.07.02 추가: 더미 waitlist 연결을 실제 Creem 체크아웃 호출로 교체.
        // create-checkout.js 함수 호출이 실패하면(예: Netlify 환경변수 CREEM_API_KEY /
        // CREEM_PRODUCT_ID가 아직 등록 안 된 상태, 또는 Creem 승인 전) 기존처럼
        // waitlist 폼으로 자동 폴백하므로, 서비스가 끊기는 일 없이 안전하게 배포 가능.
        document.getElementById('paywall-secure-button').addEventListener('click', async () => {
            gtag('event', 'click_checkout_initiate', {
                'element_type': currentElement,
                'orientation': orientation,
                'price': 4.99,
                'currency': 'USD'
            });

            const buyBtn = document.getElementById('paywall-secure-button');
            const originalLabel = buyBtn.innerHTML;
            buyBtn.disabled = true;
            buyBtn.innerHTML = 'Preparing your checkout…';

            try {
                const res = await fetch('/.netlify/functions/create-checkout', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ archetypeId: currentElement })
                });
                const data = await res.json();

                if (!res.ok || !data.checkoutUrl) {
                    throw new Error(data.error || 'checkoutUrl missing from response');
                }

                gtag('event', 'checkout_redirect', {
                    'element_type': currentElement,
                    'orientation': orientation,
                    'test_mode': !!data.testMode
                });

                window.location.href = data.checkoutUrl;
            } catch (err) {
                console.warn('[checkout] Creem 체크아웃 생성 실패, waitlist 폼으로 전환:', err.message);
                buyBtn.disabled = false;
                buyBtn.innerHTML = originalLabel;
                showWaitlistForm();
            }
        });
    </script>

    <!-- 미리보기 모듈 (2026.07.03, v48 확정 구조 8요소) -->
    <script src="/preview.js"></script>
    <script>
        // currentElement는 위 메인 스크립트의 최상위 const — type_XX_y 형식(publicKey).
        // 값이 없으면(직접 URL 진입 등) 미리보기는 조용히 생략됨(initPreview 내부 안전 처리).
        if (currentElement && currentElement !== 'unknown' && typeof initPreview === 'function') {
            initPreview(currentElement, {
                onUnlock: () => {
                    const buyBtn = document.getElementById('paywall-secure-button');
                    if (buyBtn) {
                        buyBtn.click();
                    } else {
                        // 구매 버튼이 waitlist 폼으로 대체된 상태면 그 영역으로 스크롤
                        const area = document.getElementById('paywall-area');
                        if (area) area.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            });
        }
    </script>
</body>
</html>
