    <script>
    async function getCosmicBlueprint() {
        const birthYear = document.getElementById('birthYear').value;
        const birthMonth = document.getElementById('birthMonth').value;
        const birthDay = document.getElementById('birthDay').value;
        const birthTime = document.getElementById('birthTime').value;

        if(!birthYear || !birthDay) {
            alert('Please enter your details correctly.');
            return;
        }

        document.getElementById('resultArea').innerHTML = '<p style="text-align:center; color:#00ffff;">Calculating your archetype...</p>';

        try {
            const response = await fetch('/.netlify/functions/saju-engine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ birthYear, birthMonth, birthDay, birthTime })
            });

            const result = await response.json();

            if(result.success) {
                sessionStorage.setItem('cosmic_name', result.elementName);
                sessionStorage.setItem('cosmic_hook', result.hook);
                sessionStorage.setItem('cosmic_body', result.body);
                sessionStorage.setItem('cosmic_question', result.question);
                sessionStorage.setItem('cosmic_element_key', result.elementKey);
                sessionStorage.setItem('cosmic_version_idx', result.versionIdx);

                const currentUrlParams = new URLSearchParams(window.location.search);
                window.location.href = `/report.html?${currentUrlParams.toString()}`;
            } else {
                alert('Engine communication error occurred.');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('Failed to connect. Please try again.');
        }
    }
    </script>
